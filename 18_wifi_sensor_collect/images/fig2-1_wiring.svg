<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="'Malgun Gothic','Segoe UI',sans-serif">
  <rect x="0" y="0" width="640" height="320" fill="#ffffff"/>
  <text x="20" y="30" font-size="23.8" font-weight="bold" fill="#1b1f24">그림 2-1. 회로 결선도 (가변저항 → A0)</text>

  <!-- Potentiometer -->
  <rect x="60" y="110" width="140" height="110" rx="10" fill="#eae6fb" stroke="#7a5cc0" stroke-width="2"/>
  <text x="130" y="150" font-size="21" font-weight="bold" text-anchor="middle" fill="#3d2a70">가변저항</text>
  <text x="130" y="172" font-size="16.8" text-anchor="middle" fill="#3d2a70">10kΩ</text>
  <!-- pot terminals -->
  <circle cx="200" cy="130" r="5" fill="#d64545"/>
  <circle cx="200" cy="165" r="5" fill="#0a7d7d"/>
  <circle cx="200" cy="200" r="5" fill="#333"/>
  <text x="150" y="245" font-size="16.1" text-anchor="middle" fill="#555">① 끝  ② 와이퍼  ③ 끝</text>

  <!-- Board -->
  <rect x="440" y="90" width="160" height="160" rx="10" fill="#d7f0f0" stroke="#0a7d7d" stroke-width="2"/>
  <text x="520" y="118" font-size="19.6" font-weight="bold" text-anchor="middle" fill="#065c5c">UNO R4 WiFi</text>
  <!-- board pins -->
  <rect x="432" y="124" width="16" height="12" fill="#d64545"/>
  <text x="470" y="134" font-size="18.2" fill="#065c5c">5V</text>
  <rect x="432" y="159" width="16" height="12" fill="#0a7d7d"/>
  <text x="470" y="169" font-size="18.2" fill="#065c5c">A0</text>
  <rect x="432" y="194" width="16" height="12" fill="#333"/>
  <text x="470" y="204" font-size="18.2" fill="#065c5c">GND</text>

  <!-- wires -->
  <path d="M200,130 H440" stroke="#d64545" stroke-width="2.5" fill="none"/>
  <path d="M200,165 H432" stroke="#0a7d7d" stroke-width="3" fill="none"/>
  <path d="M200,200 H440" stroke="#333" stroke-width="2.5" fill="none"/>

  <text x="320" y="123" font-size="16.1" text-anchor="middle" fill="#d64545">5V</text>
  <text x="320" y="158" font-size="16.1" text-anchor="middle" fill="#0a7d7d">신호(가운데=와이퍼)</text>
  <text x="320" y="216" font-size="16.1" text-anchor="middle" fill="#333">GND</text>

  <text x="320" y="290" font-size="16.8" text-anchor="middle" fill="#666">손잡이를 돌리면 와이퍼(A0) 전압이 0V↔5V로 변함 → analogRead(A0) 0~4095</text>
</svg>
