<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 260" font-family="'Malgun Gothic','Segoe UI',sans-serif">
  <defs>
    <marker id="arwR" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#3b6fd6"/></marker>
    <marker id="arwG" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#0a7d7d"/></marker>
  </defs>
  <rect x="0" y="0" width="780" height="260" fill="#ffffff"/>
  <text x="20" y="30" font-size="23.8" font-weight="bold" fill="#1b1f24">그림 2-2. 방법 A — 보드가 웹서버 (PC가 값을 당김)</text>

  <!-- PC -->
  <rect x="40" y="90" width="230" height="100" rx="10" fill="#e8eefc" stroke="#3b6fd6" stroke-width="2"/>
  <text x="155" y="126" font-size="21" font-weight="bold" text-anchor="middle" fill="#26468f">PC</text>
  <text x="155" y="150" font-size="17.5" text-anchor="middle" fill="#26468f">pc_collect_A.py / 브라우저</text>
  <text x="155" y="171" font-size="16.8" text-anchor="middle" fill="#26468f">CSV 저장 + 실시간 그래프</text>

  <!-- Board -->
  <rect x="510" y="90" width="230" height="100" rx="10" fill="#d7f0f0" stroke="#0a7d7d" stroke-width="2"/>
  <text x="625" y="126" font-size="21" font-weight="bold" text-anchor="middle" fill="#065c5c">UNO R4 (웹서버 :80)</text>
  <text x="625" y="152" font-size="17.5" text-anchor="middle" fill="#065c5c">요청이 오면 analogRead(A0)</text>

  <!-- request arrow -->
  <line x1="272" y1="120" x2="508" y2="120" stroke="#3b6fd6" stroke-width="2.5" marker-end="url(#arwR)"/>
  <text x="390" y="110" font-size="17.5" text-anchor="middle" fill="#3b6fd6">HTTP GET  http://보드IP</text>

  <!-- response arrow -->
  <line x1="508" y1="162" x2="272" y2="162" stroke="#0a7d7d" stroke-width="2.5" marker-end="url(#arwG)"/>
  <text x="390" y="182" font-size="17.5" text-anchor="middle" fill="#0a7d7d">응답  "adc,volt"</text>

  <text x="390" y="228" font-size="16.8" text-anchor="middle" fill="#666">1초마다 반복 — 보드는 서버, PC가 원할 때 값을 "당겨온다"</text>
</svg>
